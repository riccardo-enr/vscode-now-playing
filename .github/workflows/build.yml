name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  vsix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache-workspaces: playbar-sidecar

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install Linux build deps
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Build sidecar (linux-x64)
        working-directory: playbar-sidecar
        run: cargo build --release

      - name: Stage sidecar into extension
        run: |
          mkdir -p extension/bin/linux-x64
          cp playbar-sidecar/target/release/playbar extension/bin/linux-x64/

      - name: Stage LICENSE into extension
        run: cp LICENSE extension/LICENSE

      - name: Install extension deps
        working-directory: extension
        run: npm ci

      - name: Compile TypeScript
        working-directory: extension
        run: npm run compile

      - name: Package vsix
        working-directory: extension
        run: npx --yes @vscode/vsce package --target linux-x64

      - name: Verify sidecar is bundled
        working-directory: extension
        run: |
          vsix=$(ls *.vsix | head -n1)
          unzip -l "$vsix" | grep -q 'extension/bin/linux-x64/playbar$' \
            || { echo "::error::sidecar binary not found inside $vsix"; exit 1; }

      - uses: actions/upload-artifact@v4
        with:
          name: playbar-linux-x64-vsix
          path: extension/*.vsix

      - name: Publish release with vsix
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" extension/*.vsix --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes \
              extension/*.vsix
          fi
